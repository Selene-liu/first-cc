<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>护眼助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    background: #1a1a26;
    color: #fff;
    user-select: none;
    -webkit-app-region: drag;
  }

  .widget {
    width: 360px;
    padding: 32px 28px 28px;
    background: rgba(30, 30, 40, 0.75);
    backdrop-filter: blur(40px) saturate(1.2);
    -webkit-backdrop-filter: blur(40px) saturate(1.2);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    text-align: center;
    -webkit-app-region: no-drag;
  }

  /* === Clock === */
  .clock {
    font-size: 52px;
    font-weight: 200;
    letter-spacing: 4px;
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
    color: rgba(255, 255, 255, 0.9);
  }
  .clock .seconds { font-size: 28px; color: rgba(255, 255, 255, 0.35); }
  .date {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 2px;
    margin-bottom: 24px;
    font-weight: 400;
  }

  /* === Status === */
  .status-badge {
    display: inline-block;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    font-weight: 500;
    margin-bottom: 20px;
    transition: all 0.4s ease;
  }
  .status-badge.work {
    background: rgba(255, 159, 67, 0.2);
    color: #ff9f43;
    border: 1px solid rgba(255, 159, 67, 0.25);
  }
  .status-badge.rest {
    background: rgba(46, 213, 115, 0.15);
    color: #2ed573;
    border: 1px solid rgba(46, 213, 115, 0.2);
  }

  /* === Timer === */
  .timer-wrapper {
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto 20px;
  }
  .timer-ring { transform: rotate(-90deg); }
  .timer-ring .bg-circle {
    fill: none;
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 4;
  }
  .timer-ring .progress {
    fill: none;
    stroke: #ff9f43;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
  }
  .timer-ring .progress.rest-mode {
    stroke: #2ed573;
  }

  .timer-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .timer-display {
    font-size: 52px;
    font-weight: 200;
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    color: rgba(255, 255, 255, 0.9);
  }
  .timer-sub {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* === Cycle Info === */
  .cycle-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .cycle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }
  .cycle-dot.done { background: rgba(255, 255, 255, 0.2); }
  .cycle-dot.current {
    background: #ff9f43;
    box-shadow: 0 0 6px rgba(255, 159, 67, 0.4);
  }
  .cycle-dot.current.rest-dot {
    background: #2ed573;
    box-shadow: 0 0 6px rgba(46, 213, 115, 0.4);
  }

  /* === Controls === */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
    letter-spacing: 1px;
    font-family: inherit;
    -webkit-app-region: no-drag;
  }
  .btn:active { transform: scale(0.94); }

  .btn-primary {
    background: rgba(255, 159, 67, 0.85);
    color: #fff;
    min-width: 90px;
  }
  .btn-primary:hover { background: rgba(255, 159, 67, 1); }
  .btn-primary.rest-btn {
    background: rgba(46, 213, 115, 0.85);
  }
  .btn-primary.rest-btn:hover { background: rgba(46, 213, 115, 1); }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.85);
  }

  .btn-danger {
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .btn-danger:hover {
    background: rgba(255, 77, 77, 0.15);
    color: #ff4d4d;
    border-color: rgba(255, 77, 77, 0.2);
  }

  /* === Reset Controls === */
  .reset-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .reset-controls .btn {
    padding: 8px 18px;
    font-size: 12px;
    min-width: 80px;
  }

  /* === Custom Time === */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding-top: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  .settings-row label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 1px;
  }
  .time-input {
    width: 52px;
    padding: 5px 8px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 13px;
    text-align: center;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    outline: none;
    transition: all 0.2s;
    -webkit-app-region: no-drag;
  }
  .time-input:focus {
    border-color: rgba(255, 159, 67, 0.4);
    background: rgba(255, 255, 255, 0.08);
  }
  .time-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .time-unit {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.25);
    margin-right: 10px;
  }
  .apply-btn {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    -webkit-app-region: no-drag;
  }
  .apply-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.8);
  }

  /* === Animations === */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .widget { animation: fadeIn 0.6s ease; }

  @keyframes pulse-glow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
  }
  .timer-display.warning {
    animation: pulse-glow 1.5s ease infinite;
    color: #ff9f43;
  }

  /* === Alarm Modal === */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    -webkit-app-region: no-drag;
  }
  .modal-overlay.active { display: flex; }

  .modal-dialog {
    background: rgba(30, 30, 40, 0.95);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px 36px 32px;
    text-align: center;
    width: 300px;
    box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease;
  }

  .modal-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .modal-title.work-done { color: #ff9f43; }
  .modal-title.rest-done { color: #2ed573; }

  .modal-sub {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .modal-btn {
    min-width: 140px;
    padding: 12px 32px;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="widget">
  <!-- 时钟 -->
  <div class="clock" id="clockDisplay">
    <span id="clockHour">00</span>:<span id="clockMin">00</span><span class="seconds" id="clockSec">:00</span>
  </div>
  <div class="date" id="dateDisplay">0000年00月00日 周日</div>

  <!-- 状态标签 -->
  <div class="status-badge work" id="statusBadge">工作中</div>

  <!-- 计时器 -->
  <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 120 120" width="200" height="200">
      <circle class="bg-circle" cx="60" cy="60" r="52"/>
      <circle class="progress" id="progressRing" cx="60" cy="60" r="52"
        stroke-dasharray="326.73" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="timer-display" id="timerDisplay">20:00</div>
      <div class="timer-sub" id="timerSub">点击开始</div>
    </div>
  </div>

  <!-- 进度点 -->
  <div class="cycle-bar" id="cycleBar"></div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn-primary" id="mainBtn">开始</button>
    <button class="btn btn-secondary" id="pauseBtn">暂停</button>
  </div>
  <div class="controls reset-controls">
    <button class="btn btn-secondary" id="resetWorkBtn">重置为工作</button>
    <button class="btn btn-secondary" id="resetRestBtn">重置为休息</button>
  </div>

  <!-- 自定义时间设置 -->
  <div class="settings-row">
    <label>工作时长</label>
    <input class="time-input" type="number" id="workInput" value="20" min="1" max="120">
    <span class="time-unit">分</span>
    <label>休息时长</label>
    <input class="time-input" type="number" id="restInput" value="5" min="1" max="60">
    <span class="time-unit">分</span>
    <button class="apply-btn" id="applyBtn">应用</button>
  </div>
</div>

<!-- Alarm Modal -->
<div class="modal-overlay" id="alarmModal">
  <div class="modal-dialog">
    <div class="modal-title" id="modalTitle">工作完成</div>
    <div class="modal-sub" id="modalSub">该休息一下了</div>
    <button class="btn btn-primary modal-btn" id="dismissBtn">关闭提示</button>
  </div>
</div>

<script>
// ======== State ========
const STATE = {
  phase: 'work',         // 'work' | 'rest'
  timeLeft: 20 * 60,
  totalTime: 20 * 60,
  workDuration: 20 * 60,
  restDuration: 5 * 60,
  running: false,
  paused: false,
  interval: null,
  endTime: 0,            // absolute end timestamp (ms) for sleep-resistant timing
  wakeLock: null,        // screen wake lock reference
  cycleCount: 0,         // completed work sessions this cycle
};

// ======== DOM refs ========
const clockHour   = document.getElementById('clockHour');
const clockMin    = document.getElementById('clockMin');
const clockSec    = document.getElementById('clockSec');
const dateDisplay = document.getElementById('dateDisplay');
const statusBadge = document.getElementById('statusBadge');
const timerDisplay = document.getElementById('timerDisplay');
const timerSub    = document.getElementById('timerSub');
const progressRing = document.getElementById('progressRing');
const cycleBar    = document.getElementById('cycleBar');
const mainBtn     = document.getElementById('mainBtn');
const pauseBtn    = document.getElementById('pauseBtn');
const resetWorkBtn = document.getElementById('resetWorkBtn');
const resetRestBtn = document.getElementById('resetRestBtn');
const workInput   = document.getElementById('workInput');
const restInput   = document.getElementById('restInput');
const applyBtn    = document.getElementById('applyBtn');

const R = 52;
const CIRCUM = 2 * Math.PI * R; // 326.73

// ======== Clock ========
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  clockHour.textContent = String(h).padStart(2, '0');
  clockMin.textContent  = String(m).padStart(2, '0');
  clockSec.textContent  = ':' + String(s).padStart(2, '0');

  const days = ['日', '一', '二', '三', '四', '五', '六'];
  const y = now.getFullYear();
  const mo = now.getMonth() + 1;
  const d = now.getDate();
  dateDisplay.textContent = `${y}年${String(mo).padStart(2, '0')}月${String(d).padStart(2, '0')}日 周${days[now.getDay()]}`;
}

// ======== Timer UI ========
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateTimerUI() {
  timerDisplay.textContent = formatTime(STATE.timeLeft);

  const frac = STATE.timeLeft / STATE.totalTime;
  const offset = CIRCUM * (1 - frac);
  progressRing.setAttribute('stroke-dashoffset', offset);

  // warning pulse when < 10% time left
  timerDisplay.classList.toggle('warning', STATE.running && frac < 0.1);

  // ring color
  progressRing.classList.toggle('rest-mode', STATE.phase === 'rest');
}

function updateStatusUI() {
  const isWork = STATE.phase === 'work';
  statusBadge.textContent = isWork ? '工作中' : '休息中';
  statusBadge.className = 'status-badge ' + (isWork ? 'work' : 'rest');
  mainBtn.classList.toggle('rest-btn', !isWork);
}

function updateSubLabel() {
  if (!STATE.running && !STATE.paused) {
    timerSub.textContent = STATE.phase === 'work' ? '点击开始工作' : '点击开始休息';
  } else if (STATE.paused) {
    timerSub.textContent = '已暂停';
  } else {
    timerSub.textContent = STATE.phase === 'work' ? '专注工作' : '放松一下';
  }
}

function updateCycleBar() {
  const total = STATE.cycleCount + 1; // show completed + current
  let html = '';
  for (let i = 0; i < total; i++) {
    let cls = 'cycle-dot';
    if (i < STATE.cycleCount) cls += ' done';
    if (i === STATE.cycleCount) {
      cls += ' current';
      if (STATE.phase === 'rest') cls += ' rest-dot';
    }
    html += `<span class="${cls}"></span>`;
  }
  cycleBar.innerHTML = html;
}

// ======== Timer Logic ========
function tick() {
  // Use wall-clock time so sleep/interval drift doesn't break accuracy
  STATE.timeLeft = Math.max(0, Math.round((STATE.endTime - Date.now()) / 1000));
  updateTimerUI();

  if (STATE.timeLeft <= 0) {
    stopTimer();

    if (STATE.phase === 'work') STATE.cycleCount++;
    playAlarm();
    showModal(STATE.phase === 'work');
  }
}

function switchPhase(phase) {
  STATE.phase = phase;
  STATE.totalTime = phase === 'work' ? STATE.workDuration : STATE.restDuration;
  STATE.timeLeft = STATE.totalTime;
  STATE.running = false;
  STATE.paused = false;
  clearInterval(STATE.interval);
  STATE.interval = null;

  // auto-start next phase
  startTimer();

  updateAllUI();
}

function startTimer() {
  if (STATE.interval) return;
  STATE.running = true;
  STATE.paused = false;
  STATE.endTime = Date.now() + STATE.timeLeft * 1000;
  STATE.interval = setInterval(tick, 1000);
  mainBtn.textContent = '工作中';
  if (STATE.phase === 'rest') mainBtn.textContent = '休息中';
  updateSubLabel();
  requestWakeLock();
}

function pauseTimer() {
  if (!STATE.running) return;
  STATE.running = false;
  STATE.paused = true;
  clearInterval(STATE.interval);
  STATE.interval = null;
  // Sync timeLeft from wall clock before stopping
  STATE.timeLeft = Math.max(0, Math.round((STATE.endTime - Date.now()) / 1000));
  mainBtn.textContent = '继续';
  updateSubLabel();
  releaseWakeLock();
}

function resumeTimer() {
  if (STATE.paused) {
    STATE.running = true;
    STATE.paused = false;
    STATE.endTime = Date.now() + STATE.timeLeft * 1000;
    STATE.interval = setInterval(tick, 1000);
    mainBtn.textContent = STATE.phase === 'work' ? '工作中' : '休息中';
    updateSubLabel();
    requestWakeLock();
  }
}

function stopTimer() {
  STATE.running = false;
  STATE.paused = false;
  clearInterval(STATE.interval);
  STATE.interval = null;
  releaseWakeLock();
}

function resetToWork() {
  stopTimer();
  stopAlarm();
  hideModal();
  STATE.phase = 'work';
  STATE.totalTime = STATE.workDuration;
  STATE.timeLeft = STATE.workDuration;
  mainBtn.textContent = '开始';
  timerDisplay.classList.remove('warning');
  updateAllUI();
  updateSubLabel();
}

function resetToRest() {
  stopTimer();
  stopAlarm();
  hideModal();
  STATE.phase = 'rest';
  STATE.totalTime = STATE.restDuration;
  STATE.timeLeft = STATE.restDuration;
  mainBtn.textContent = '开始';
  timerDisplay.classList.remove('warning');
  updateAllUI();
  updateSubLabel();
}

// ======== Wake Lock (prevent sleep while timer is active) ========
function requestWakeLock() {
  if ('wakeLock' in navigator && !STATE.wakeLock) {
    navigator.wakeLock.request('display').then(lock => {
      STATE.wakeLock = lock;
      lock.addEventListener('release', () => { STATE.wakeLock = null; });
    }).catch(() => {});
  }
}

function releaseWakeLock() {
  if (STATE.wakeLock) {
    STATE.wakeLock.release().catch(() => {});
    STATE.wakeLock = null;
  }
}

// ======== Alarm Sound (looping until dismissed) ========
let alarmInterval = null;
let alarmCtx = null;

function playAlarm() {
  requestWakeLock();
  try {
    alarmCtx = new (window.AudioContext || window.webkitAudioContext)();

    function blast() {
      if (!alarmCtx) return;
      // Resume context if suspended after display sleep
      if (alarmCtx.state === 'suspended') alarmCtx.resume();
      const now = alarmCtx.currentTime;

      // Harsh square wave + higher volume for attention
      [880, 660].forEach((freq, i) => {
        const osc = alarmCtx.createOscillator();
        const gain = alarmCtx.createGain();
        osc.connect(gain); gain.connect(alarmCtx.destination);
        osc.frequency.value = freq;
        osc.type = 'square';
        const t = now + i * 0.2;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.35, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        osc.start(t);
        osc.stop(t + 0.45);
      });
    }

    blast();
    alarmInterval = setInterval(blast, 700);
  } catch(e) { /* silent fallback */ }
}

function stopAlarm() {
  releaseWakeLock();
  if (alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
  if (alarmCtx) {
    alarmCtx.close().catch(() => {});
    alarmCtx = null;
  }
}

// ======== Alarm Modal ========
const alarmModal = document.getElementById('alarmModal');
const modalTitle = document.getElementById('modalTitle');
const modalSub = document.getElementById('modalSub');
const dismissBtn = document.getElementById('dismissBtn');

function showModal(wasWork) {
  if (wasWork) {
    modalTitle.textContent = '工作完成';
    modalTitle.className = 'modal-title work-done';
    modalSub.textContent = '该休息一下了';
    dismissBtn.className = 'btn btn-primary modal-btn rest-btn';
  } else {
    modalTitle.textContent = '休息结束';
    modalTitle.className = 'modal-title rest-done';
    modalSub.textContent = '该继续工作了';
    dismissBtn.className = 'btn btn-primary modal-btn';
  }
  alarmModal.classList.add('active');
}

function hideModal() {
  alarmModal.classList.remove('active');
}

dismissBtn.addEventListener('click', () => {
  stopAlarm();
  hideModal();

  const goingToRest = STATE.phase === 'work';
  if (goingToRest) {
    // was in work phase, modal was shown, now switch to rest
    switchPhase('rest');
  } else {
    // was in rest phase, modal was shown, now switch to work
    switchPhase('work');
  }
});

// ======== Full UI Sync ========
function updateAllUI() {
  updateTimerUI();
  updateStatusUI();
  updateSubLabel();
  updateCycleBar();
}

// ======== Event Listeners ========
mainBtn.addEventListener('click', () => {
  if (STATE.running) {
    pauseTimer();
  } else if (STATE.paused) {
    resumeTimer();
  } else {
    startTimer();
  }
});

pauseBtn.addEventListener('click', pauseTimer);

resetWorkBtn.addEventListener('click', resetToWork);
resetRestBtn.addEventListener('click', resetToRest);

applyBtn.addEventListener('click', () => {
  const w = parseInt(workInput.value) || 20;
  const r = parseInt(restInput.value) || 5;
  STATE.workDuration = Math.max(60, w * 60);   // at least 1 min
  STATE.restDuration = Math.max(60, r * 60);

  const wasRunning = STATE.running || STATE.paused;
  stopTimer();
  stopAlarm();
  hideModal();
  STATE.totalTime = STATE.phase === 'work' ? STATE.workDuration : STATE.restDuration;
  STATE.timeLeft = STATE.totalTime;
  timerDisplay.classList.remove('warning');
  if (!wasRunning) {
    mainBtn.textContent = '开始';
  }
  updateAllUI();
  updateSubLabel();
});

// Enter key on inputs
document.querySelectorAll('.time-input').forEach(inp => {
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyBtn.click();
  });
});

// ======== Init ========
updateClock();
setInterval(updateClock, 1000);
updateAllUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    user-select: none;
  }
  .container {
    text-align: center; padding: 40px; width: 400px;
  }
  h1 {
    font-size: 28px; font-weight: 300; letter-spacing: 4px;
    margin-bottom: 40px; color: #a0a0b8;
  }

  /* SVG Progress Ring */
  .timer-wrapper {
    position: relative; width: 280px; height: 280px; margin: 0 auto 36px;
  }
  .timer-ring {
    transform: rotate(-90deg);
  }
  .timer-ring .bg { fill: none; stroke: #2a2a4a; stroke-width: 6; }
  .timer-ring .progress {
    fill: none; stroke: #ff6b6b; stroke-width: 6;
    stroke-linecap: round; transition: stroke-dashoffset 0.3s ease;
  }
  .timer-ring .progress.break { stroke: #4ecdc4; }

  .timer-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .timer-display {
    font-size: 64px; font-weight: 300; letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .timer-label {
    font-size: 14px; color: #888; margin-top: 8px; letter-spacing: 2px;
  }

  /* Controls */
  .controls { display: flex; gap: 16px; justify-content: center; margin-bottom: 32px; }
  .btn {
    padding: 12px 32px; border: none; border-radius: 8px;
    font-size: 15px; cursor: pointer; transition: all 0.2s;
    font-weight: 500; letter-spacing: 1px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: #ff6b6b; color: #fff; }
  .btn-primary:hover { background: #ff5252; }
  .btn-secondary { background: transparent; color: #888; border: 1px solid #3a3a5a; }
  .btn-secondary:hover { color: #eee; border-color: #666; }

  /* Mode Tabs */
  .mode-tabs { display: flex; gap: 4px; justify-content: center; margin-bottom: 36px; }
  .mode-tab {
    padding: 8px 20px; border: none; border-radius: 6px;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    background: transparent; color: #666;
  }
  .mode-tab:hover { color: #aaa; }
  .mode-tab.active { background: #2a2a4a; color: #eee; }

  /* Stats */
  .stats { display: flex; gap: 32px; justify-content: center; color: #666; font-size: 13px; }
  .stats span { color: #a0a0b8; font-weight: 500; }
</style>
</head>
<body>

<div class="container">
  <h1>POMODORO</h1>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="pomodoro">番茄钟</button>
    <button class="mode-tab" data-mode="shortBreak">短休息</button>
    <button class="mode-tab" data-mode="longBreak">长休息</button>
  </div>

  <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 200 200" width="280" height="280">
      <circle class="bg" cx="100" cy="100" r="90"/>
      <circle class="progress" id="progress" cx="100" cy="100" r="90"
        stroke-dasharray="565.48" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="timer-display" id="display">25:00</div>
      <div class="timer-label" id="label">专注时间</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="mainBtn">开始</button>
    <button class="btn btn-secondary" id="resetBtn">重置</button>
  </div>

  <div class="stats">
    <div>已完成 <span id="count">0</span> 个番茄</div>
  </div>
</div>

<script>
const MODES = {
  pomodoro:  { duration: 25 * 60, label: '专注时间', cls: '' },
  shortBreak: { duration: 5 * 60,  label: '短休息',   cls: 'break' },
  longBreak:  { duration: 15 * 60, label: '长休息',   cls: 'break' },
};

let state = {
  mode: 'pomodoro',
  timeLeft: MODES.pomodoro.duration,
  running: false,
  total: MODES.pomodoro.duration,
  interval: null,
  completed: parseInt(localStorage.getItem('pomodoro_count') || '0'),
};

const display = document.getElementById('display');
const label = document.getElementById('label');
const progress = document.getElementById('progress');
const mainBtn = document.getElementById('mainBtn');
const resetBtn = document.getElementById('resetBtn');
const countEl = document.getElementById('count');
const tabs = document.querySelectorAll('.mode-tab');
const R = 90;
const C = 2 * Math.PI * R; // 565.48

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function updateUI() {
  display.textContent = formatTime(state.timeLeft);
  label.textContent = MODES[state.mode].label;
  countEl.textContent = state.completed;

  const frac = state.timeLeft / state.total;
  const offset = C * (1 - frac);
  progress.setAttribute('stroke-dashoffset', offset);
  progress.className = 'progress' + (MODES[state.mode].cls ? ' ' + MODES[state.mode].cls : '');
}

function switchMode(mode) {
  if (state.running) stop();
  state.mode = mode;
  state.timeLeft = MODES[mode].duration;
  state.total = MODES[mode].duration;
  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  mainBtn.textContent = '开始';
  updateUI();
}

function tick() {
  state.timeLeft--;
  updateUI();
  if (state.timeLeft <= 0) {
    stop();
    beep();
    if (state.mode === 'pomodoro') {
      state.completed++;
      localStorage.setItem('pomodoro_count', state.completed);
      countEl.textContent = state.completed;
    }
    // auto-switch
    const next = state.mode === 'pomodoro'
      ? 'shortBreak'
      : 'pomodoro';
    switchMode(next);
  }
}

function start() {
  state.running = true;
  state.interval = setInterval(tick, 1000);
  mainBtn.textContent = '暂停';
}

function pause() {
  state.running = false;
  clearInterval(state.interval);
  state.interval = null;
  mainBtn.textContent = '继续';
}

function stop() {
  state.running = false;
  clearInterval(state.interval);
  state.interval = null;
  mainBtn.textContent = '开始';
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
    // second beep
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.frequency.value = 880;
    osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.3);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc2.start(ctx.currentTime + 0.3);
    osc2.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

// --- Event Listeners ---
mainBtn.addEventListener('click', () => {
  if (state.running) pause();
  else start();
});

resetBtn.addEventListener('click', () => {
  const wasRunning = state.running;
  if (wasRunning) stop();
  state.timeLeft = MODES[state.mode].duration;
  state.total = MODES[state.mode].duration;
  if (state.mode === 'pomodoro') mainBtn.textContent = '开始';
  updateUI();
});

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.classList.contains('active')) return;
    switchMode(tab.dataset.mode);
  });
});

// Init
updateUI();
</script>
</body>
</html>
